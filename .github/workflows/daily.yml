name: Daily JP Market Recap

on:
  schedule:
    # 日股 15:00 JST 收盤,15:30 JST 跑批 = 06:30 UTC
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate dashboard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_jp.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jp_dashboard.html jp_dashboard_embed.html
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Daily recap $(date -u +'%Y-%m-%d')"
            git push
          fi

      # WP page 2716 is now a static iframe pointing to GitHub Pages URL.
      # Content updates happen via the Pages deploy below, so no more WP REST push.

  deploy-pages:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - name: Build pages artifact (dashboard only)
        run: |
          mkdir -p _site
          cp jp_dashboard.html _site/index.html
          cp jp_dashboard.html _site/jp_dashboard.html
          cp jp_dashboard_embed.html _site/ || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - id: deployment
        uses: actions/deploy-pages@v4
